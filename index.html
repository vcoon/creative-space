<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 Sir爷的创意空间</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── particles canvas ── */
  #particles {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── hero ── */
  .hero {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; text-align: center;
    padding: 2rem;
  }

  .hero-icon {
    font-size: 4rem;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255, 107, 53, 0.5));
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .hero h1 {
    font-size: 2.4rem; font-weight: 700;
    margin: 1.2rem 0 0.6rem;
    background: linear-gradient(135deg, #ff6b35, #f7c948, #ff6b35);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 4s ease infinite;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .hero p {
    font-size: 1rem; color: #888;
    font-weight: 300; letter-spacing: 2px;
    opacity: 0; animation: fadeUp 1s 0.5s forwards;
  }

  .scroll-hint {
    position: absolute; bottom: 2rem;
    opacity: 0; animation: fadeUp 1s 1.2s forwards;
  }

  .scroll-hint span {
    display: block; width: 2px; height: 30px;
    background: linear-gradient(to bottom, #ff6b35, transparent);
    margin: 0 auto;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.3); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── sections ── */
  .section {
    position: relative; z-index: 1;
    max-width: 600px; margin: 0 auto;
    padding: 4rem 1.5rem;
  }

  .section-title {
    font-size: 1.1rem; font-weight: 300;
    color: #666; letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 2rem;
    text-align: center;
  }

  /* ── card grid ── */
  .cards {
    display: flex; flex-direction: column; gap: 1rem;
  }

  .card {
    position: relative;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 16px;
    padding: 1.8rem 1.5rem;
    text-decoration: none; color: inherit;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
    opacity: 0; transform: translateY(30px);
  }

  .card.visible {
    opacity: 1; transform: translateY(0);
  }

  .card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, rgba(255, 107, 53, 0.08), transparent);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .card:hover {
    border-color: rgba(255, 107, 53, 0.3);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(255, 107, 53, 0.1);
  }

  .card:hover::before { opacity: 1; }

  .card-icon {
    font-size: 2.2rem; margin-bottom: 0.8rem;
    display: block;
  }

  .card-title {
    font-size: 1.2rem; font-weight: 700;
    margin-bottom: 0.4rem;
  }

  .card-desc {
    font-size: 0.85rem; color: #777;
    line-height: 1.6;
  }

  .card-tag {
    display: inline-block;
    margin-top: 0.8rem;
    padding: 0.25rem 0.7rem;
    font-size: 0.7rem;
    border-radius: 20px;
    background: rgba(255, 107, 53, 0.15);
    color: #ff6b35;
  }

  /* ── footer ── */
  .footer {
    position: relative; z-index: 1;
    text-align: center;
    padding: 3rem 1rem 2rem;
    color: #333;
    font-size: 0.75rem;
    letter-spacing: 1px;
  }

  /* ── glow orb ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }

  .orb-1 {
    width: 400px; height: 400px;
    background: #ff6b35;
    top: -100px; right: -100px;
    animation: drift1 15s ease-in-out infinite alternate;
  }

  .orb-2 {
    width: 300px; height: 300px;
    background: #f7c948;
    bottom: -50px; left: -50px;
    animation: drift2 18s ease-in-out infinite alternate;
  }

  @keyframes drift1 {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-100px, 80px); }
  }

  @keyframes drift2 {
    0% { transform: translate(0, 0); }
    100% { transform: translate(80px, -60px); }
  }

  /* ── responsive ── */
  @media (min-width: 768px) {
    .hero h1 { font-size: 3.2rem; }
    .section { max-width: 700px; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

</section>

<!-- 灵感 -->

  <div class="cards">

<script>
// ── particle system ──
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let w, h, particles = [];

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.r = Math.random() * 1.5 + 0.5;
    this.alpha = Math.random() * 0.4 + 0.1;
    this.life = Math.random() * 300 + 200;
    this.age = 0;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.age++;
    if (this.age > this.life || this.x < -10 || this.x > w + 10 || this.y < -10 || this.y > h + 10) {
      this.reset();
    }
  }
  draw() {
    const fade = 1 - this.age / this.life;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 107, 53, ${this.alpha * fade})`;
    ctx.fill();
  }
}

for (let i = 0; i < 60; i++) particles.push(new Particle());

function loop() {
  ctx.clearRect(0, 0, w, h);
  particles.forEach(p => { p.update(); p.draw(); });

  // draw connections
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(255, 107, 53, ${0.06 * (1 - dist / 120)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(loop);
}
loop();

// ── scroll reveal ──
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
    }
  });
}, { threshold: 0.15 });

document.querySelectorAll('.card').forEach((card, i) => {
  card.style.transitionDelay = `${i * 0.12}s`;
  observer.observe(card);
});
</script>
